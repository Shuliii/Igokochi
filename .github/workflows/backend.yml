name: Backend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "igokochi_backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ricoharsono/igokochi-backend:latest ./igokochi_backend

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker push
        run: docker push ricoharsono/igokochi-backend:latest

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Restart deployment
        run: kubectl rollout restart deployment igokochi-backend
