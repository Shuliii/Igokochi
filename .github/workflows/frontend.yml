name: Frontend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "igokochi/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg VITE_API_BASE_URL=https://igokochihouse.com/api -t ricoharsono/igokochi-frontend:latest ./igokochi

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker push
        run: docker push ricoharsono/igokochi-frontend:latest

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Restart deployment
        run: kubectl rollout restart deployment igokochi-frontend
