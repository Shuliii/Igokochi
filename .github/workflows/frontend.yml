name: Frontend Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "igokochi/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build --build-arg VITE_API_BASE_URL=https://igokochihouse.com/api -t ricoharsono/igokochi-frontend:${{ env.IMAGE_TAG }} ./igokochi

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker push
        run: docker push ricoharsono/igokochi-frontend:${{ env.IMAGE_TAG }}

      # GitOps: update values.yaml in helm-DO repo to trigger helm-deploy pipeline
      - name: Update image tag in Helm chart
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          git clone https://x-access-token:${{ secrets.HELM_REPO_TOKEN }}@github.com/ricoharsono/helm-DO.git
          cd helm-DO
          yq e ".frontend.image.tag = \"$IMAGE_TAG\"" -i igokochi/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add igokochi/values.yaml
          git commit -m "ci: update igokochi frontend image tag to $IMAGE_TAG"
          git push
