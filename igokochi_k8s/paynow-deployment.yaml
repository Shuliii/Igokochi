apiVersion: apps/v1
kind: Deployment
metadata:
  name: paynow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paynow
  template:
    metadata:
      labels:
        app: paynow
    spec:
      containers:
        - name: paynow
          image: ricoharsono/paynow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PAYNOW_PHONE
              value: "87956046"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: paynow-service
spec:
  selector:
    app: paynow
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
